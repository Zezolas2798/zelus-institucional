<!-- 
    ZELUS MASTER VECTOR (Pure SVG - Infinite Resolution)
    Este arquivo é 100% código. Pode ser ampliado até o tamanho de um prédio sem perder 1 pixel de qualidade.
-->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradiente Premium ZELUS (Extraído da Identidade Visual) -->
        <linearGradient id="zelus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff8e8b;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#fe615e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#d94d4a;stop-opacity:1" />
        </linearGradient>
        
        <!-- Sombra Projetada via Código -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="6" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.2" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Anel de Proteção (Zelo) -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.1" />
    
    <!-- O "Z" em Formato de Fita (Ribbon) - Geometria Vetorial Pura -->
    <path d="M55,65 
             C55,65 145,65 145,65 
             C145,65 55,135 55,135 
             C55,135 145,135 145,135" 
          fill="none" 
          stroke="url(#zelus-grad)" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#shadow)" />
          
    <!-- Detalhe da Curva Circular para fechar o conceito -->
    <path d="M145,65 A45,45 0 0,1 145,135" 
          fill="none" 
          stroke="url(#zelus-grad)" 
          stroke-width="16" 
          stroke-linecap="round"
          opacity="0.9" />
</svg>
